<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="block.css" type="text/css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaulteM</title>
</head>
<body>
    <!-- start of form page (sign in) -->
        
    <div id="wrapper">
        <button class="back" onclick="history.back()"> &#60; Back</button> <!-- &#60 untuk "<"" symbol -->
        <div class="leftcontainer">
            <a href="studentMAIN.html"></a>
            <header>
            <h1>VaulteM</h1>
            <p>UTeM Store Management</p>
        </header>
        </div>

        <div class="rightcontainer">
            <h1>Sign in</h1>
            <form>
                <div class="nameGenderRow">
                    <input type="text" placeholder="Name">
                    <select><option>Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <input type="email" placeholder="Student Email"> <!--type email tmbh .com -->
                <input type="password" placeholder="Password"> <!--type password, auto censor -->
                <input type="password" placeholder="Confirm Password">
                <button>Sign in</button>
            </form>
        
        </div>
    </div>
</body>
