<!DOCTYPE html>
<html lang="en">
<!-- <link rel="stylesheet" href="vaultem.css" type="text/css"> -->
<link rel="stylesheet" href="mobile.css" type="text/css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaulteM</title>
</head>

<style>
    * {
        font-family: 'Courier New', Courier, monospace;
    }

    body {
        background-color: #E8E9DE;
        margin: 10;

    }

    header h1 {
        color: #241253;
        font-size: 3.5rem;
        text-align: center;
        margin-bottom: 0px;
        padding: 0;
        text-shadow: 1px 1.2px 0px rgba(0, 0, 0, 0.395);
    }

    .main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
    }

    .main p {
        margin-top: 0px;
        margin-bottom: 15px;
    }

    #wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        /*viewport height*/
        flex-direction: column;

    }

    button {
        background-color: #241253;
        color: #E8E9DE;
        width: 200px;
        text-align: center;
        border-radius: 20px;
        padding: 10px;
        margin: 0px;
    }

    button:hover {
        background-color: #37216d;
        cursor: pointer;
        transform: translateY(-2px);
    }

    .main a[href="staffMAIN.html"],
    .main a[href="studentMAIN.html"] {
        align-self: flex-end;
        text-align: right;
        max-width: 150px;
        margin-top: -17px;
        font-size: 0.8rem;
        line-height: 1.2;
        color: #241253;
    }
</style>

<body>
    <div id="wrapper">

        <header>
            <h1>
                <font face="Arial">VaulteM</font>
            </h1>
        </header>

        <!--welcome page -->
        <div class="main">
            <p>UTeM Store Management</p>
            <a href="signin.html"><button>Sign in</button></a>
            <a href="login.html"><button>Log in</button></a>
            <p></p>
            <a href="staffMAIN.html">You're a student. Switch to staff?</a>
        </div>

    </div>
</body>

</html>
