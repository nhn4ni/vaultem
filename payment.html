<!DOCTYPE html>
<html lang="en">
<!-- <link rel="stylesheet" href="block.css" type="text/css"> -->

<!-- <link rel="stylesheet" href="mobile.css" type="text/css"> -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaulteM</title>



</head>

<style>
    * {
        font-family: 'Courier New', Courier, monospace;
    }

    body {
        background-color: #E8E9DE;
        color: #241253;
    }

    #body2 {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .back {
        position: absolute;
        border-style: none;
        background-color: #E8E9DE;
        font-size: 1.2rem;
        font-weight: bold;
        color: #241253;
        margin: 15px;
    }

    h2 {
        text-align: center;
        margin-top: 0; /* Prevents default heading margins from breaking alignment */
    }

    .paymentBox {
        width: 65%;
        height: 50%;
        background-color: #241253;
        color: #E8E9DE;
        border: 1px solid #ccc;
        border-radius: 20px;
        padding: 20px;
        box-sizing: border-box; /* Crucial to keep padding from making the box overflow */

        /* 1. Turn the card into a flex column */
        display: flex;
        flex-direction: column;
        align-items: flex-start; /* Keeps top contents left-aligned */
    }

    /* Force the heading to stay centered horizontally across the box width */
    .paymentBox h2 {
        width: 100%;
    }

    #totalAmount {
        font-weight: bold;
        font-size: 1.2rem;
    }

    #payBtn {
        background-color: #E8E9DE;
        width: 30%;
        padding: 10px;
        border-style: none;
        border-radius: 25px;
    }

    #payBtn:hover {
        background-color: #d6d7ca;
        cursor: pointer;
        transform: translateY(-2px);
    }

   
    .totalSection {
        margin-top: auto; 
        display: flex;
        flex-direction: column;
        align-items: flex-start; 
        width: 100%;
    }

   
    .totalSection p {
        margin: 5px 0;
    }
    
    #payBtn {
        margin-top: 10px; 
    }
</style>

<body>

    <div id="wrapper">
        <button class="back" onclick="history.back()"> &#60; Back</button>
    </div>

    <div id="body2">
        <div class="paymentBox">
            <h2>Payment</h2>
            <h3>
                Booking Summary
            </h3>
            <div class="totalSection">
                <p>Total:</p>
                <p><span id="totalAmount">RM 0.00</span></p>
                <button id="payBtn">Pay</button>
            </div>
        </div>
    </div>
</body>

</html>
