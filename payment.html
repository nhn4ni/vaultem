<!DOCTYPE html>
<html lang="en">
<!-- <link rel="stylesheet" href="block.css" type="text/css"> -->

<!-- <link rel="stylesheet" href="mobile.css" type="text/css"> -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaulteM</title>



</head>

<style>
    * {
        font-family: 'Courier New', Courier, monospace;
    }

    body {
        background-color: #E8E9DE;
        color: #241253;
    }

    #body2 {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .back {
        position: absolute;
        border-style: none;
        background-color: #E8E9DE;
        font-size: 1.2rem;
        font-weight: bold;
        color: #241253;
        margin: 15px;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        /* Prevents default heading margins from breaking alignment */
    }

    .paymentBox {
        width: 65%;
        min-height: 55%;
        background-color: #241253;
        color: #E8E9DE;
        border: 1px solid #ccc;
        border-radius: 20px;
        padding: 20px;
        box-sizing: border-box;
        /* Crucial to keep padding from making the box overflow */

        /* 1. Turn the card into a flex column */
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        /* Keeps top contents left-aligned */
    }

    /* Force the heading to stay centered horizontally across the box width */
    .paymentBox h2 {
        width: 100%;
    }

    #totalAmount {
        font-weight: bold;
        font-size: 1.2rem;
    }

    #payBtn {
        background-color: #E8E9DE;
        width: 30%;
        padding: 10px;
        border-style: none;
        border-radius: 25px;
    }

    #payBtn:hover {
        background-color: #d6d7ca;
        cursor: pointer;
        transform: translateY(-2px);
    }


    .totalSection {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
    }


    .totalSection p {
        margin: 5px 0;
    }

    #payBtn {
        margin-top: 10px;
    }

    #payMethod {
        /* display: none;
        opacity:0; */
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transform: translateY(-10px);
        transition: all 0.3s ease;
    }

    #payMethod.show {
        /* display: block; */
        opacity: 1;
        max-height: 300px;
        transform: translateY(0);
    }

    
</style>

<body>

    <div id="wrapper">
        <button class="back" onclick="history.back()"> &#60; Back</button>
    </div>

    <div id="body2">
        <div class="paymentBox">
            <h2>Payment</h2>


            <div class="bookingSummary">
                <h3>Booking Summary</h3>
                <p>
                    Total Item:
                    <span id="totalItem">3</span>
                </p>
                <p>
                    Drop-off Date:
                    <span id="dropOff_Date">Loading...</span>
                </p>
                <p>
                    Pick-up Date:
                    <span id="pickUp_Date"></span>
                </p>

                <p>
                    Residential College:
                    <span id="resCollege">Lestari B</span>
                </p>
            </div>

            <div class="totalSection">
                <p>Total:</p>
                <p><span id="totalAmount">RM 0.00</span></p>
                <button id="payBtn" onclick="toggleMenu()">Pay</button>
            </div>
            <div id="payMethod">
                <p>Select your payment method:</p>

                <input type="radio" id="banking" name="payment">
                <label for="banking">Online Banking</label><br>

                <input type="radio" id="card" name="payment">
                <label for="card">Credit/Debit Card</label><br>

                <input type="radio" id="qr" name="payment">
                <label for="qr">QR</label>
            </div>

        </div>
    </div>


    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const retrievedDate = localStorage.getItem('savedDropOffDate');
            const pickDate = localStorage.getItem('savedpickupDate');
            document.getElementById('dropOff_Date').textContent = retrievedDate;
            document.getElementById('pickUp_Date').textContent = pickDate;

        });

        function toggleMenu() {
            document.getElementById("payMethod").classList.toggle("show");
        }
    </script>
</body>

</html>
