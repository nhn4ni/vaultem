<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaulteM</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <!-- NOTE: This is a static entry page. All authentication is handled by login.php -->
    <div id="wrapper">
        <button class="back" onclick="history.back()">&#60; Back</button>

        <div class="leftcontainer">
            <header>
                <h1>VaulteM</h1>
                <p>UTeM Store Management</p>
            </header>
        </div>

        <div class="rightcontainer">
            <h1>Log in</h1>

            <!--
                FIX: Removed broken JS login() function that redirected to mainStatus.html
                     (bypassing authentication entirely).
                FIX: Submit button now correctly submits the form to login.php for
                     server-side authentication.
            -->
            <form method="POST" action="login.php">
                <input type="email"    name="userEmail"    id="userEmail"    placeholder="Student Email" required>
                <input type="password" name="userPassword" id="userPassword" placeholder="Password"      required>
                <button type="submit">Log in</button>
            </form>

            <p style="margin-top:15px;">
                Don't have an account? <a href="register.php">Register here</a>
            </p>
            <p>
                <a href="newpass.php">Forgot password?</a>
            </p>
        </div>
    </div>

    <!-- FIX: Removed JS popup that was only triggered by the old broken login() function -->
</body>
</html>
