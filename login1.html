<body>
    <!-- start of form page (sign in) -->
        
    <div id="wrapper">
        <button class="back" onclick="history.back()"> &#60; Back</button> <!-- &#60 untuk "<"" symbol -->
        <div class="leftcontainer">
            <a href="studentMAIN.html"></a>
            <header>
            <h1>VaulteM</h1>
            <p>UTeM Store Management</p>
        </header>
        </div>

        <div class="rightcontainer">
            <h1>Log in</h1>
            <form method="post" action="login.php">
                <!--<div class="nameGenderRow">
                <input type="text" placeholder="Name">
                    <select><option>Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>-->
                <input type="email" name="userEmail" id="userEmail" placeholder="Student Email"> <!--type email tmbh .com -->
                <input type="password" name="userPassword" id="userPassword" placeholder="Password"> <!--type password, auto censor -->
                <!--<input type="password" placeholder="Confirm Password">-->
                <button type="submit">
                Log in
                </button>
            </form>
        
        </div>

    <div id="popupError" class="hidden">
        <div id="emptyField">
            <div id="emptyText">
                <header>
                    <h3>Error</h3>
                </header>
                
                <p>Please fill in both field</p>

                <div id="emptyBTN">
                    <button class="ok" onclick="okayBTN()">OK</button>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        function login(){
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;

            if(email === '' || password === ''){
                document.getElementById('popupError').classList.toggle('hidden');
                return;
            }

            window.location.href="mainStatus.html";

        }

        function okayBTN(){
            document.getElementById('popupError').classList.toggle('hidden');
        }
    </script>
